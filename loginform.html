<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
        :root {
            --page-bg: linear-gradient(135deg, #f7efff 0%, #fdf8ff 45%, #f4ecff 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-main: #2f2340;
            --text-soft: #6e6480;
            --border: #ded2ef;
            --accent: #7c3aed;
            --accent-dark: #6d28d9;
            --accent-soft: #efe4ff;
            --shadow: 0 24px 55px rgba(106, 67, 160, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background: var(--page-bg);
            padding: 24px;
        }

        .login-card {
            width: min(100%, 420px);
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 34px 28px 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .eyebrow {
            margin: 0 0 8px;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.9rem;
        }

        .intro {
            margin: 0 0 24px;
            color: var(--text-soft);
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1rem;
            color: var(--text-main);
            background: #ffffff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12);
        }

        .password-wrap {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            padding: 6px 8px;
        }

        .toggle-password:hover {
            color: var(--accent-dark);
        }

        .submit-btn {
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 16px 26px rgba(124, 58, 237, 0.22);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(124, 58, 237, 0.28);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .helper {
            margin: 0;
            font-size: 0.88rem;
            color: var(--text-soft);
        }

        .message {
            display: none;
            margin: 14px 0 0;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #fff4f7;
            color: #b42318;
            border: 1px solid #ffd0da;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #f1fdf4;
            border-color: #c9f0d2;
            color: #166534;
        }
    </style>
</head>
<body>
    <section class="login-card">
        <p class="eyebrow">Secure Access</p>
        <h1>Login</h1>
        <p class="intro">Sign in with your username and password. Your password is hidden by default, and you can click Show to check it if needed.</p>

        <form id="loginForm">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">Show</button>
                </div>
                <p class="helper">The password field is masked for privacy.</p>
            </div>

            <button type="submit" class="submit-btn">Log In</button>
        </form>

        <p id="message" class="message">Invalid username or password.</p>
    </section>

    <script>
        const loginForm = document.getElementById("loginForm");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const togglePasswordButton = document.getElementById("togglePassword");
        const messageBox = document.getElementById("message");

        const correctUsername = "hanami";
        const correctPassword = "123456";

        togglePasswordButton.addEventListener("click", function () {
            const isHidden = passwordInput.type === "password";
            passwordInput.type = isHidden ? "text" : "password";
            togglePasswordButton.textContent = isHidden ? "Hide" : "Show";
            togglePasswordButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
        });

        loginForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const enteredUsername = usernameInput.value.trim();
            const enteredPassword = passwordInput.value;

            if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
                messageBox.textContent = "Login successful.";
                messageBox.className = "message show success";
                return;
            }

            messageBox.textContent = "Invalid username or password.";
            messageBox.className = "message show";
        });
    </script>
</body>
</html>
